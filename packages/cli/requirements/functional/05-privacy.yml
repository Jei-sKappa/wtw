- id: WTW-FR-0005
  title: Privacy and local exclude ownership
  status: active
  description: >
    The canonical local artifacts (`.config/wt.toml`, `.worktreeinclude`, and
    the primary `<repo>.code-workspace`) are private per-clone automation kept
    out of commits through a single delimited, idempotently managed block in the
    shared `<git-common-dir>/info/exclude`, covering exactly those paths and
    preserving all unrelated bytes. Because a local exclude cannot hide a file
    Git already tracks, any required private path that is tracked is a privacy
    conflict: `init` performs no writes. Reconciling an existing valid managed
    block never duplicates its entries.
  acceptance:
    - id: AC-0501
      statement: >
        Initialization creates/reconciles one delimited local-exclude block
        containing all required private paths while preserving all unrelated
        `info/exclude` bytes. (spec AC-05.1)
    - id: AC-0502
      statement: >
        If any required private path is tracked by Git, `init` performs no
        writes and introduces no tracked repository file. The complementary
        `check` FAIL is proven by `wtw check` (Task 13). (spec AC-05.2)
    - id: AC-0503
      statement: >
        Reconciliation of an existing valid managed block is idempotent and
        never duplicates its entries. (spec AC-05.3)
