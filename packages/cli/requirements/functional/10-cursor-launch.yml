- id: WTW-FR-0010
  title: Cursor launch behavior
  status: active
  description: >
    Plain `sync` never opens Cursor. `sync --open` launches `cursor` with the
    exact absolute primary-worktree workspace path exactly once, strictly after
    every synchronization write has succeeded. If the launch fails after those
    writes, the synchronized state remains in place (no rollback) and the command
    exits 1 with the launch error. Direct synchronization blocks until the writes
    and any launch attempt complete before the command returns. `init` and
    `check` never invoke Cursor. Automated suites drive a fake `cursor` shim that
    only records the workspace path it was asked to open and never spawns a GUI.
  notes: >
    AC-10.1's `plain sync never invokes Cursor` portion is proven now by the
    `sync-open-plain-no-invoke` case. Its `init`/`check` portions are not yet
    E2E-provable: `wtw init` and `wtw check` are stubs (they throw
    `not_implemented` before any effect) until Tasks 12 and 13 give them real
    bodies; those tasks add the init/check no-invoke assertions to their own
    cases, so no active acceptance criterion here is left uncovered by an
    existing case. AC-10.4 (spec) is a manual-only criterion: a supported real
    Cursor opening/focusing the named workspace can only be observed by a human,
    never by the hermetic fast suite (which must never launch a GUI). Following
    the FR-15 precedent for criteria unreachable from the fast harness, AC-10.4
    is not declared as an automated acceptance criterion; its evidence is the
    manual step recorded in `packages/cli/docs/RELEASE-CHECKLIST.md`.
  acceptance:
    - id: AC-1001
      statement: >
        Plain `sync` (no `--open`) never invokes Cursor: the fake-Cursor
        invocation log stays empty. (spec AC-10.1; `init`/`check` no-invoke
        assertions are added by Tasks 12/13.)
    - id: AC-1002
      statement: >
        `sync --open` invokes the fake Cursor exactly once with the exact
        absolute root workspace path, only after the synchronization writes
        succeed. (spec AC-10.2)
    - id: AC-1003
      statement: >
        A simulated Cursor launch failure after the writes preserves the
        synchronized files and exits 1 with the launch error. (spec AC-10.3)
