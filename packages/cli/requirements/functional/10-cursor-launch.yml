- id: CURSOR-FR-0001
  title: Commands that never launch Cursor
  status: active
  description: >
    Only `sync --open` may launch Cursor. `wtw init`, `wtw check`, and a plain
    `wtw sync` never invoke the editor. Automated suites drive a fake `cursor`
    shim that records the workspace path it is asked to open and never spawns a
    GUI, so a never-launched command leaves the invocation log empty.
  acceptance:
    - id: AC-0001
      statement: >
        Plain `wtw sync` leaves the fake-Cursor invocation log empty.
      verifiedBy: case
    - id: AC-0002
      statement: >
        `wtw init` leaves the fake-Cursor invocation log empty.
      verifiedBy: case
    - id: AC-0003
      statement: >
        `wtw check` leaves the fake-Cursor invocation log empty.
      verifiedBy: case

- id: CURSOR-FR-0002
  title: Launch on sync --open
  status: active
  description: >
    `sync --open` launches `cursor` with the exact absolute primary-worktree
    workspace path exactly once, strictly after every synchronization write has
    succeeded. Direct synchronization blocks until the writes and the launch
    attempt complete before the command returns.
  acceptance:
    - id: AC-0001
      statement: >
        `sync --open` invokes the fake Cursor exactly once with the exact
        absolute root workspace path, only after the synchronization writes
        succeed.
      verifiedBy: case

- id: CURSOR-FR-0003
  title: Launch failure after writes
  status: active
  description: >
    A launch attempt happens only after synchronization writes have succeeded,
    so a failed launch never rolls the writes back. The command surfaces the
    launch error and exits 1 while leaving the synchronized state in place.
  acceptance:
    - id: AC-0001
      statement: >
        A simulated Cursor launch failure after the writes preserves the
        synchronized files and exits 1 with the launch error.
      verifiedBy: case

- id: CURSOR-FR-0004
  title: Real Cursor open and focus
  status: active
  description: >
    The hermetic suites can only prove the exact argument and ordering against
    the fake shim. Whether a supported real Cursor actually opens and focuses
    the workspace can be observed only by a human, so it is proven by a manual
    release check rather than an automated case.
  acceptance:
    - id: AC-0001
      statement: >
        A supported real Cursor opens and focuses the named root workspace.
      verifiedBy: manual
      manualStep: cursor-open-focus
