- id: WTW-FR-0011
  title: Diagnostics
  status: active
  description: >
    `wtw check` is a READ-ONLY aggregate diagnostic. It acquires no lock, opens
    no Cursor, and reports findings under the seven stable categories in order —
    Repository, Dependencies, Privacy, Worktrunk, Copy policy, Synchronization,
    Cursor workspace — with `PASS`/`WARN`/`FAIL` severities (and `SKIPPED` for a
    dependent check a missing prerequisite made unrunnable). It ends with
    deterministic severity counts, exits 0 when no failure exists (warnings
    included), and exits 1 when any failure exists. When a prerequisite is
    unavailable it marks dependent checks skipped instead of emitting cascading
    false failures, and it never changes repository, Worktrunk, approval, lock,
    or Cursor state.
  acceptance:
    - id: AC-1101
      statement: >
        A healthy fixture prints every stable category in order, contains only
        pass findings, prints deterministic counts, performs no writes or Cursor
        call, and exits 0. (spec AC-11.1)
    - id: AC-1102
      statement: >
        A warning-only fixture exits 0; each defined failure fixture exits 1;
        both print aggregate counts matching the emitted findings. (spec
        AC-11.2)
    - id: AC-1103
      statement: >
        A fixture with an unavailable prerequisite marks dependent checks skipped
        and does not emit misleading cascaded failures. (spec AC-11.3)
    - id: AC-1104
      statement: >
        A before/after snapshot proves `check` never changes repository,
        Worktrunk, approval, lock, or Cursor state. (spec AC-11.4)
