- id: CHECK-FR-0001
  title: Healthy aggregate report
  status: active
  description: >
    `wtw check` is a read-only aggregate diagnostic. It reports findings under
    the seven stable categories in order — Repository, Dependencies, Privacy,
    Worktrunk, Copy policy, Synchronization, Cursor workspace — and ends with
    deterministic severity counts. A fully healthy repository yields only pass
    findings and exit 0.
  acceptance:
    - id: AC-0001
      statement: >
        A healthy fixture prints every stable category in order, contains only
        pass findings, prints deterministic counts, and exits 0.
      verifiedBy: case

- id: CHECK-FR-0002
  title: Severity-driven exit code
  status: active
  description: >
    The exit code follows the highest severity present: warnings alone still
    exit 0, while any failure exits 1. Both cases print aggregate counts that
    match the emitted findings.
  acceptance:
    - id: AC-0001
      statement: >
        A warning-only fixture exits 0 and prints aggregate counts matching the
        emitted findings.
      verifiedBy: case
    - id: AC-0002
      statement: >
        A failure fixture exits 1 and prints aggregate counts matching the
        emitted findings.
      verifiedBy: case

- id: CHECK-FR-0003
  title: Skipped dependent checks
  status: active
  description: >
    When a prerequisite is unavailable, dependent checks are marked skipped
    rather than emitting cascading false failures, so an unavailable
    prerequisite does not manufacture misleading downstream failures.
  acceptance:
    - id: AC-0001
      statement: >
        A fixture with an unavailable prerequisite marks dependent checks
        skipped and does not emit misleading cascaded failures.
      verifiedBy: case

- id: CHECK-FR-0004
  title: Read-only guarantee
  status: active
  description: >
    `wtw check` acquires no lock, opens no Cursor, and mutates no state. It
    never changes repository, Worktrunk, approval, lock, or Cursor state, which
    a before/after snapshot proves.
  acceptance:
    - id: AC-0001
      statement: >
        A before/after snapshot proves `wtw check` never changes repository,
        Worktrunk, approval, lock, or Cursor state.
      verifiedBy: case
