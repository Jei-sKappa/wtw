- id: VER-FR-0001
  title: Source-run version identity
  status: active
  description: >
    The CLI reports its identity through `--version` and `-V`. A source or test
    run (not a bundled build) prints exactly the CLI package version followed by
    the ` (dev)` marker and exits 0. The bundled-build identity forms
    (embedded short SHA, Node shebang, self-contained bundle, symlink install)
    are inherently unreachable from the source-run E2E harness and are owned by
    the architecture and harness domains, evidenced by the build and install
    unit suites.
  acceptance:
    - id: AC-0001
      statement: >
        A source-run `wtw --version` prints the package version followed by
        ` (dev)` and exits 0.
      verifiedBy: case
    - id: AC-0002
      statement: >
        A source-run `wtw -V` prints the package version followed by ` (dev)`
        and exits 0.
      verifiedBy: case
