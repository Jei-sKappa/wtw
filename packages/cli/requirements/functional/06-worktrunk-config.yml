- id: CONF-FR-0001
  title: Scaffolding a missing wt.toml
  status: active
  description: >
    When `.config/wt.toml` is absent, `wtw init` scaffolds a standard Worktrunk
    project config carrying the three reserved wtw hooks with their exact
    contract command strings: a `pre-start` blocking copy, a `post-start`
    sync-and-open, and a `post-remove` sync.
  acceptance:
    - id: AC-0001
      statement: >
        A scaffolded `.config/wt.toml` carries the three reserved hooks with
        their exact distinct blocking-copy, post-start sync/open, and
        post-remove sync command strings.
      verifiedBy: case

- id: CONF-FR-0002
  title: Preserving an existing compatible TOML
  status: active
  description: >
    `wtw` never rewrites an existing `.config/wt.toml`. A file that already
    carries all three reserved hooks is preserved byte-for-byte, including any
    unrelated custom hooks, comments, ordering, and settings.
  acceptance:
    - id: AC-0001
      statement: >
        An existing TOML carrying all reserved hooks is left byte-for-byte
        unchanged, including custom hooks, comments, order, and settings.
      verifiedBy: case

- id: CONF-FR-0003
  title: Reserved-hook conflict handling
  status: active
  description: >
    A `.config/wt.toml` that is missing a reserved hook, or defines one whose
    command conflicts with the contract, is a no-write preflight conflict: init
    performs no writes and prints the exact manual additions the user must make.
    After the user corrects the file by hand, a rerun succeeds without rewriting
    it.
  acceptance:
    - id: AC-0001
      statement: >
        An existing TOML missing or conflicting with a reserved hook makes init
        perform no writes and print the exact manual additions.
      verifiedBy: case
    - id: AC-0002
      statement: >
        After the required hooks are added by hand, a rerun succeeds and leaves
        the file unrewritten.
      verifiedBy: case

- id: CONF-FR-0004
  title: Initialization never touches Worktrunk approval
  status: active
  description: >
    `wtw init` neither invokes nor mutates Worktrunk's native approval state. The
    Worktrunk executable is only resolved on `PATH`, never spawned during init.
    The complementary native first-use approval behavior of real Worktrunk is a
    contract-layer assumption owned by the worktrunk-assumptions domain.
  acceptance:
    - id: AC-0001
      statement: >
        During init the Worktrunk executable is never spawned and no approval
        state is mutated.
      verifiedBy: case
