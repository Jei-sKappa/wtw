- id: WTW-FR-0012
  title: Worktrunk compatibility
  status: active
  description: >
    The verified Worktrunk range is `>=0.67.0 <0.68.0`. `wtw check` resolves the
    Worktrunk version (`wt --version`, read-only) and evaluates it: a version in
    range passes; a version below `0.67.0` and an unparseable/absent version
    fail; `0.68.0` and newer warn as unverified but are not blocked.
  acceptance:
    - id: AC-1201
      statement: >
        Parsed versions `0.67.0` and a later `0.67.x` pass the compatibility
        finding; a version below `0.67.0` fails; `0.68.0` and a later version
        warn but do not fail; unparseable output fails. (spec AC-12.1)
    - id: AC-1202
      statement: >
        The external-contract suite runs the built `wtw` against a pinned real
        Worktrunk v0.67.0 binary and passes: `wtw check` resolves the real
        `wt --version` output (`wt v0.67.0`) and PASSes the Worktrunk
        compatibility finding, backing the verified range before it is
        represented as supported in the living document. (spec AC-12.2)
