- id: COMPAT-FR-0001
  title: Worktrunk version evaluation
  status: active
  description: >
    The verified Worktrunk range is `>=0.67.0 <0.68.0`. `wtw check` resolves the
    Worktrunk version read-only through `wt --version` and evaluates it: a
    version in range passes, a version below the minimum fails, a version at or
    above the next minor warns as unverified without blocking, and output that
    cannot be parsed fails. The complementary proof that a real Worktrunk binary
    reports its version as expected is a contract-layer assumption owned by the
    worktrunk-assumptions domain.
  acceptance:
    - id: AC-0001
      statement: >
        A version at `0.67.0` or a later `0.67.x` passes the compatibility
        finding.
      verifiedBy: case
    - id: AC-0002
      statement: >
        A version below `0.67.0` fails the compatibility finding.
      verifiedBy: case
    - id: AC-0003
      statement: >
        A version at `0.68.0` or later warns as unverified without failing.
      verifiedBy: case
    - id: AC-0004
      statement: >
        Unparseable Worktrunk version output fails the compatibility finding.
      verifiedBy: case
