- id: WTW-FR-0008
  title: Synchronization and concurrency
  status: active
  description: >
    `wtw sync` resolves the primary worktree from any supported invocation
    location, acquires ONE repository-wide cross-process lock under the Git
    common directory, and — while holding it — atomically makes every linked
    worktree's control files (`.config/wt.toml`, `.worktreeinclude`)
    byte-identical to the authoritative primary copies, re-enumerates the live
    Git worktrees, and reconciles the workspace. It copies no other
    `.worktreeinclude`-selected path. Acquisition waits a documented short
    timeout, uses the locking library's stale-lock policy with a documented
    threshold, writes nothing on a timeout, and always releases the lock on both
    success and error paths.
  acceptance:
    - id: AC-0801
      statement: >
        `sync` atomically makes every linked `.config/wt.toml` and
        `.worktreeinclude` byte-identical to the primary copies, overwriting
        divergent linked control copies. (spec AC-08.1)
    - id: AC-0802
      statement: >
        `sync` does not create, modify, or overwrite any other user-selected
        `.worktreeinclude` path. (spec AC-08.2)
    - id: AC-0803
      statement: >
        Two deliberately overlapping sync processes serialize through one
        common-directory lock and finish with folders derived from the final Git
        state, with no stale older snapshot written last. (spec AC-08.3)
    - id: AC-0804
      statement: >
        Lock timeout exits 1 without file writes; an injected error still
        releases the lock; and a library-recognized stale lock is recoverable
        according to the documented policy. (spec AC-08.4)
    - id: AC-0805
      statement: >
        A linked worktree made by raw Git gains canonical control files and a
        workspace entry after an explicit `sync`. The complementary drift REPORT
        is proven by `wtw check` (Task 13). (spec AC-08.5)
