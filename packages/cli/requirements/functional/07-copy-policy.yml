- id: COPY-FR-0001
  title: Scaffolding the copy policy
  status: active
  description: >
    When `.worktreeinclude` is absent, `wtw init` scaffolds a documented copy
    policy that the user owns and edits. The scaffold carries exactly the two
    required control entries (`.config/wt.toml` and `.worktreeinclude`) plus
    user-editing guidance, and guesses no private-data entries of its own. The
    complementary native copy of selected ignored data by real Worktrunk at
    pre-start is a contract-layer assumption owned by the worktrunk-assumptions
    domain.
  acceptance:
    - id: AC-0001
      statement: >
        A scaffolded `.worktreeinclude` contains the two required control paths
        and explanatory user-editing guidance, without guessed private-data
        entries.
      verifiedBy: case

- id: COPY-FR-0002
  title: Copy-policy diagnostics
  status: active
  description: >
    `wtw check` reports on the copy policy. A missing required control entry is
    a failure because it breaks the wtw contract; a user-authored entry that
    currently matches no ignored content is a warning, not a failure, because it
    may match content the user has yet to create.
  acceptance:
    - id: AC-0001
      statement: >
        `wtw check` fails when either required control entry is absent from
        `.worktreeinclude`.
      verifiedBy: case
    - id: AC-0002
      statement: >
        `wtw check` warns, rather than fails, for a user entry that currently
        matches no ignored content.
      verifiedBy: case
