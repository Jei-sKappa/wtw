- id: INIT-FR-0001
  title: Clean initialization of an empty repository
  status: active
  description: >
    On an empty supported repository with no conflicts, `wtw init` runs its
    predictable-conflict preflight, then creates only the missing scaffolds. The
    canonical control files and the Cursor multi-root workspace are written and
    the command exits 0. Related guarantees of a clean init — the managed
    exclude block, the byte-exact TOML hooks, synchronization of linked
    worktrees, and never launching Cursor or Worktrunk approval — are owned by
    the privacy, worktrunk-config, sync, and cursor-launch domains respectively.
  acceptance:
    - id: AC-0001
      statement: >
        Initializing an empty supported repository writes the canonical control
        files and the Cursor workspace and exits 0.
      verifiedBy: case

- id: INIT-FR-0002
  title: Dependency preflight writes nothing on conflict
  status: active
  description: >
    Before writing anything, `wtw init` verifies that Git, Worktrunk, Cursor,
    the Node runtime, and the `wtw` executable used by the hooks are all
    resolvable through `PATH` (they are resolved, never spawned). A missing
    required executable is a predictable preflight conflict on which init writes
    nothing. Other predictable conflicts (unsupported shape, tracked private
    paths, invalid or conflicting artifacts) are owned by the repository,
    privacy, worktrunk-config, copy-policy, and workspace domains.
  acceptance:
    - id: AC-0001
      statement: >
        When a required executable cannot be resolved on `PATH`, init exits 1 and
        leaves the fixture byte-for-byte unchanged.
      verifiedBy: case

- id: INIT-FR-0003
  title: Idempotent rerun on a healthy setup
  status: active
  description: >
    Rerunning `wtw init` on a repository that is already healthy is a no-op apart
    from managed-region reconciliation: it makes no semantic change beyond
    required reconciliation and preserves every user-authored byte outside the
    managed regions.
  acceptance:
    - id: AC-0001
      statement: >
        Rerunning init on a healthy setup exits 0 and preserves user-authored
        bytes outside managed regions.
      verifiedBy: case

- id: INIT-FR-0004
  title: Crash safety on mid-write failure
  status: active
  description: >
    If an unexpected filesystem failure occurs after some writes have completed,
    `wtw init` fails loudly without attempting a broad destructive rollback: it
    reports the writes already completed and leaves them in place.
  acceptance:
    - id: AC-0001
      statement: >
        An injected post-write filesystem failure exits 1 and reports the writes
        completed before the failure without deleting them.
      verifiedBy: case
