id: init-hook-conflict-no-writes
covers:
  - WTW-FR-0006.AC-0603
title: a missing reserved hook makes init perform no writes and print exact additions
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). An
  existing `.config/wt.toml` is missing the `post-start` reserved hook. `init`
  never rewrites the TOML: it exits 1, prints the exact manual additions the
  user must make, and writes nothing — the TOML and the user-authored
  `info/exclude` are byte-for-byte unchanged (no managed block is added).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/wt.toml", to: "repo/.config/wt.toml" }
  - cp: { from: "seed/exclude", to: "repo/.git/info/exclude" }
command: ["init"]
expect:
  exitCode: 1
  stdout: ""
  stderrFile: "expected/stderr"
  files:
    "repo/.config/wt.toml": "expected/wt.toml"
    "repo/.git/info/exclude": "expected/info-exclude"
