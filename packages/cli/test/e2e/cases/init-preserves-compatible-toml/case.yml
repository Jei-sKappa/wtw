id: init-preserves-compatible-toml
covers: CONF-FR-0002.AC-0001
title: init preserves an existing all-hooks TOML byte-for-byte
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). An
  existing `.config/wt.toml` carries all three reserved hooks alongside a custom
  comment and a custom hook. `init` preflight accepts it and never rewrites it:
  the file is preserved byte-for-byte (custom content, ordering, and comments
  intact) and `init` exits 0.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/wt.toml", to: "repo/.config/wt.toml" }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Preserved:", ".config/wt.toml"]
  stderr: ""
  files:
    "repo/.config/wt.toml": "expected/wt.toml"
