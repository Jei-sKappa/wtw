id: repo-bare-unsupported
covers:
  - WTW-FR-0003.AC-0303
title: a bare repository is an unsupported repository-shape failure without writes
description: >
  real Git, simulated Worktrunk/Cursor. `check` runs in a bare repository. The
  primary-support predicate fails its non-bare conjunct, so the Repository
  category FAILs deterministically, every dependent category is SKIPPED, and the
  command exits 1 without writing.
env:
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "--bare", "."] }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  Repository is bare; wtw supports only non-bare repositories."
    - "SKIPPED  Skipped because the repository context is unavailable."
  stderr: ""
