id: sync-injected-error-releases-lock
covers: SYNC-FR-0004.AC-0002
title: an injected error still releases the lock
description: >
  real Git, simulated nothing. A first `sync` is driven to throw AFTER acquiring
  the lock (fault injection via a test-only env var); it exits 1 but its
  try/finally releases the lock. The foreground `sync` then acquires the lock
  immediately and succeeds — proving the failed run left no lock behind.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_LOCK_TIMEOUT_MS: "2000"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - run:
      cmd: ["__WTW__", "sync"]
      env: { WTW_TEST_FAIL_AFTER_LOCK: "1" }
      allowFailure: true
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  fileContains:
    "repo/repo.code-workspace": ["feature-a"]
