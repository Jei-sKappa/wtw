id: init-from-nested-primary
covers: REPO-FR-0001.AC-0002
title: init resolves the primary context when run from a nested primary directory
description: >
  real Git, simulated Worktrunk/Cursor. `init` is invoked from a directory
  nested deep inside the primary worktree (`repo/src/deep`). It resolves the
  primary/common context, creates the canonical artifacts at the primary root
  `repo`, and exits 0. (Location independence, REPO-FR-0001.AC-0002.)
cwd: repo/src/deep
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "-C", "../..", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "-C", "../..", "commit", "--allow-empty", "-m", "init"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Initialized wtw local automation", "Created:"]
  stderr: ""
  fileContains:
    "repo/.config/wt.toml": ['wtw-copy = "wt step copy-ignored --require-include"']
    "repo/.worktreeinclude": [".config/wt.toml", ".worktreeinclude"]
