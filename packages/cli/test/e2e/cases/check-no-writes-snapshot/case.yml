id: check-no-writes-snapshot
covers:
  - WTW-FR-0011.AC-1104
title: check changes no repository, control, workspace, lock, or Cursor state
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, `check` runs and
  every managed artifact is asserted byte-identical to its post-init content:
  the scaffolded `.config/wt.toml` and `.worktreeinclude`, the workspace file,
  and the managed `info/exclude` block are unchanged, the pre-seeded fake-Cursor
  invocation log stays EMPTY (no launch), and no synchronization lock is left
  behind. This is the before/after snapshot proving `check` is read-only.
cwd: repo
substitute:
  __PROJECT_ROOT__: projectRoot
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains: ["Summary: 16 pass, 0 warn, 0 fail, 0 skipped."]
  stderr: ""
  files:
    "repo/.config/wt.toml": "expected/wt.toml"
    "repo/.worktreeinclude": "expected/worktreeinclude"
    "repo/repo.code-workspace": "expected/workspace"
    "repo/.fake-cursor.log": "expected/empty-log"
  fileContains:
    "repo/.git/info/exclude":
      - "# >>> wtw managed >>>"
      - ".config/wt.toml"
      - ".worktreeinclude"
      - "repo.code-workspace"
      - "# <<< wtw managed <<<"
