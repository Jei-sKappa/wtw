id: sync-open-plain-no-invoke
covers: CURSOR-FR-0001.AC-0001
title: plain sync never invokes Cursor
description: >
  real Git, simulated Cursor. `WTW_CURSOR_BIN` points at the fake `cursor` shim,
  but plain `sync` (no `--open`) must never launch it. A pre-seeded, empty
  invocation log is left EMPTY after the run, proving the launch path was never
  taken even though the seam is wired.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  files:
    "repo/.fake-cursor.log": "expected/empty-log"
