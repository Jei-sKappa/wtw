id: repo-primary-record-absent
covers: REPO-FR-0004.AC-0003
title: an absent main worktree record fails the support predicate without writes
description: >
  simulated Git (shape mode, `WTW_GIT_BIN` -> the checked-in fake `git`), simulated
  Worktrunk/Cursor. The fake reports only a bare worktree entry, so no
  main/primary worktree record is present: `check`'s repository predicate fails
  its `primary_record_present` conjunct, the Repository category FAILs, dependent
  categories are SKIPPED, and the command exits 1 without writing.
env:
  WTW_GIT_BIN: __FAKE_GIT_BIN__
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_GIT_SHAPE: "1"
  FAKE_GIT_NO_PRIMARY: "1"
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  `git worktree list --porcelain` reported no main/primary worktree record."
    - "SKIPPED  Skipped because the repository context is unavailable."
  stderr: ""
