id: sync-raw-git-worktree-repaired
covers:
  - WTW-FR-0008.AC-0805
  - WTW-FR-0013.AC-1303
title: raw-git linked worktree gains control files and workspace entry
description: >
  real Git, simulated nothing. A linked worktree created by raw `git worktree
  add` (which runs no Worktrunk hooks) starts with no control files. An explicit
  `sync` repairs the drift: the worktree gains canonical `.config/wt.toml` and
  `.worktreeinclude` copies and a workspace folder entry. (The complementary
  drift REPORT is proven by `wtw check` in Task 13.)
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  files:
    "wt-a/.config/wt.toml": "expected/wt.toml"
    "wt-a/.worktreeinclude": "expected/worktreeinclude"
  fileContains:
    "repo/repo.code-workspace": ["feature-a"]
