id: init-hook-conflict-corrected
covers:
  - WTW-FR-0006.AC-0603
title: after correcting a hook conflict, rerunning init succeeds without rewriting
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). A
  first `init` (a setup step allowed to fail) refuses a conflicting
  `.config/wt.toml`. The fixture is then manually corrected to carry all reserved
  hooks plus a custom hook. The rerun (the command under test) succeeds, exits 0,
  and preserves the corrected TOML byte-for-byte (it is never rewritten).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "variants/conflicting.toml", to: "repo/.config/wt.toml" }
  - run: { cmd: ["__WTW__", "init"], allowFailure: true }
  - cp: { from: "variants/corrected.toml", to: "repo/.config/wt.toml" }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Preserved:", ".config/wt.toml"]
  stderr: ""
  files:
    "repo/.config/wt.toml": "expected/wt.toml"
