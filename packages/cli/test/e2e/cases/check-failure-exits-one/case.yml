id: check-failure-exits-one
covers: CHECK-FR-0002.AC-0002
title: a failure check exits 1 and prints aggregate counts matching the findings
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, a required
  private path (`.worktreeinclude`) is force-tracked by Git, which `check`
  reports as a Privacy FAIL. Because a failure is present, `check` exits 1 and
  its summary reports the aggregate counts matching the emitted findings — zero
  warn, one fail (CHECK-FR-0002.AC-0002).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - run: { cmd: ["git", "add", "-f", ".worktreeinclude"] }
  - run: { cmd: ["git", "commit", "-m", "track worktreeinclude"] }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "Summary:"
    - "0 warn, 1 fail"
  stderr: ""
