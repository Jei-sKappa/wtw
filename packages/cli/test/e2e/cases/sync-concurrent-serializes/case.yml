id: sync-concurrent-serializes
covers: SYNC-FR-0003.AC-0001
title: overlapping syncs serialize and write final Git state
description: >
  real Git, simulated nothing. A first `sync` is launched in the background and
  made to hold the one repository lock until a release file appears (test
  barrier). While it holds the lock, a second linked worktree `wt-b` is created,
  then the barrier is released. The foreground `sync` contends for the same lock
  and, because each sync re-enumerates worktrees while holding the lock, the
  final workspace folders derive from the final Git state (both feature-a and
  feature-b) — never a stale pre-lock snapshot.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_TEST_HOLD_UNTIL: ".wtw-release"
  WTW_LOCK_TIMEOUT_MS: "15000"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - run: { cmd: ["__WTW__", "sync"], background: true }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-b", "../wt-b"] }
  - run: { cmd: ["touch", ".wtw-release"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  fileContains:
    "repo/repo.code-workspace": ["feature-a", "feature-b"]
