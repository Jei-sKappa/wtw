id: check-version-0680-warns
covers:
  - WTW-FR-0012.AC-1201
title: check warns (does not fail) for Worktrunk 0.68.0 and newer
description: >
  real Git, simulated Worktrunk (reports 0.68.0). `0.68.0` is the exclusive
  upper bound of the verified range, so it is treated as unverified: the
  Worktrunk category WARNs but does not fail, and the command exits 0.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_WT_VERSION: "0.68.0"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains:
    - "WARN  Worktrunk 0.68.0 is newer than the verified range"
    - "1 warn, 0 fail"
  stderr: ""
