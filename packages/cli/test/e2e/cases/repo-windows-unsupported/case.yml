id: repo-windows-unsupported
covers:
  - WTW-FR-0003.AC-0303
title: a simulated Windows host is an unsupported platform failure without writes
description: >
  real Git, simulated Worktrunk/Cursor, simulated Windows platform
  (`WTW_PLATFORM=win32`). `check` reports the platform as unsupported (a FAIL),
  marks the repository shape and every dependent category SKIPPED (no cascade),
  writes nothing, and exits 1.
env:
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: win32
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - 'FAIL  Platform "win32" is unsupported; wtw supports macOS (verified) and Linux (unverified/best-effort).'
    - "SKIPPED  Repository shape not checked because the platform is unsupported."
  stderr: ""
