id: sync-workspace-preserves-jsonc
covers:
  - WTW-FR-0009.AC-0902
title: sync edits only folders and preserves surrounding JSONC
description: >
  real Git, simulated nothing. The primary workspace is valid JSONC with a
  comment and an unrelated `settings` property. `sync` edits ONLY the top-level
  `folders` (adding the linked worktree) while preserving the comment, the
  `settings` block, and formatting.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  fileContains:
    "repo/repo.code-workspace":
      - "Team workspace — do not delete this comment."
      - "\"settings\""
      - "editor.tabSize"
      - "feature-a"
