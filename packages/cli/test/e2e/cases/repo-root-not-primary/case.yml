id: repo-root-not-primary
covers: REPO-FR-0004.AC-0006
title: root discovery not resolving to the primary fails the support predicate without writes
description: >
  simulated Git (shape mode, `WTW_GIT_BIN` -> the checked-in fake `git`), simulated
  Worktrunk/Cursor. The fake makes `--show-toplevel` resolve to a subdirectory
  of the primary rather than the primary path, so `check`'s repository predicate
  fails its `root_resolves_to_primary` conjunct: the Repository category FAILs,
  dependent categories are SKIPPED, and the command exits 1 without writing.
env:
  WTW_GIT_BIN: __FAKE_GIT_BIN__
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_GIT_SHAPE: "1"
  FAKE_GIT_TOPLEVEL_SUFFIX: "nested"
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  Git repository-root discovery resolved to"
    - "SKIPPED  Skipped because the repository context is unavailable."
  stderr: ""
