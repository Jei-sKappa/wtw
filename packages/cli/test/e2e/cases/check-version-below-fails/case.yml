id: check-version-below-fails
covers: COMPAT-FR-0001.AC-0002
title: check fails the compatibility finding for a version below 0.67.0
description: >
  real Git, simulated Worktrunk (reports 0.66.9). A version below the inclusive
  minimum `0.67.0` fails the compatibility finding, so the Worktrunk category
  FAILs and the command exits 1.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_WT_VERSION: "0.66.9"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  Worktrunk 0.66.9 is below the minimum verified version 0.67.0"
    - "0 warn, 1 fail"
  stderr: ""
