id: check-warning-only-exits-zero
covers: CHECK-FR-0002.AC-0001
title: a warning-only check exits 0 and prints aggregate counts matching the findings
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, a linked
  worktree is registered and its directory deleted, leaving a missing/prunable
  registration that `check` reports as a WARN with no FAIL. Because the highest
  severity is a warning, `check` exits 0 and its summary reports the aggregate
  counts matching the emitted findings — one warn, zero fail (CHECK-FR-0002.AC-0001).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - run: { cmd: ["rm", "-rf", "../wt-a"] }
command: ["check"]
expect:
  exitCode: 0
  stdoutContains:
    - "Summary:"
    - "1 warn, 0 fail"
  stderr: ""
