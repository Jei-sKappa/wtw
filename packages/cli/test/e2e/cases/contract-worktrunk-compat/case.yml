id: contract-worktrunk-compat
covers:
  - WTW-FR-0012.AC-1202
title: check passes the compatibility finding against the real v0.62.0 binary
description: >
  real Git, real Worktrunk v0.62.0, simulated Cursor. The built `wtw` runs
  `check` against the pinned real Worktrunk binary in isolated home/config state.
  `check` resolves the real `wt --version` output (`wt v0.62.0`), extracts the
  `0.62.0` triple, and PASSes the Worktrunk compatibility finding within the
  verified range `>=0.62.0 <0.63.0`; every category PASSes and the command exits
  0. This backs the verified range with a passing real contract (spec AC-12.2).
  Run only under `bun run test:contract`; skipped when the pinned binary is
  absent.
mode: contract
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains:
    - "PASS  Worktrunk 0.62.0 is within the verified range >=0.62.0 <0.63.0."
    - "16 pass, 0 warn, 0 fail"
  stderr: ""
