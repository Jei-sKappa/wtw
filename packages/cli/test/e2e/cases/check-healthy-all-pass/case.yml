id: check-healthy-all-pass
covers:
  - WTW-FR-0011.AC-1101
  - WTW-FR-0003.AC-0301
title: check prints every category in order with only PASS findings and exits 0
description: >
  real Git, simulated Worktrunk/Cursor (each resolved on PATH; only `wt
  --version` is spawned, read-only). On a freshly initialized single-worktree
  repository, `check` prints the seven stable categories in their fixed order,
  every finding is PASS, the summary counts are deterministic, no Cursor launch
  occurs, and it exits 0. The full-stdout compare proves the exact category
  order and counts. Running from the primary root also proves context
  resolution (AC-03.1).
cwd: repo
substitute:
  __PROJECT_ROOT__: projectRoot
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutFile: "expected/stdout.txt"
  stderr: ""
