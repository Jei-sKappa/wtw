id: sync-stale-lock-recoverable
covers:
  - WTW-FR-0008.AC-0804
title: a recognized stale lock is recovered
description: >
  real Git, simulated nothing. A mutex directory is pre-created and back-dated
  far past the stale threshold. `sync` recognizes the abandoned lock per the
  library's documented stale policy, recovers it, and completes successfully.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - run: { cmd: ["mkdir", "-p", ".git/wtw-sync.lock"] }
  - run: { cmd: ["touch", "-t", "200001010000", ".git/wtw-sync.lock"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  fileContains:
    "repo/repo.code-workspace": ["feature-a"]
