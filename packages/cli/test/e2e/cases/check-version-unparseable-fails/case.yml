id: check-version-unparseable-fails
covers:
  - WTW-FR-0012.AC-1201
title: check fails the compatibility finding for unparseable Worktrunk output
description: >
  real Git, simulated Worktrunk (reports the unparseable string `banana`).
  Output that carries no semantic version triple fails the compatibility
  finding, so the Worktrunk category FAILs and the command exits 1.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_WT_VERSION: "banana"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - 'FAIL  Worktrunk version "banana" is not a parseable semantic version'
    - "0 warn, 1 fail"
  stderr: ""
