id: check-copy-policy-fails-missing-required
covers:
  - WTW-FR-0011.AC-1102
  - WTW-FR-0007.AC-0702
title: check fails when a required copy-policy control entry is absent
description: >
  real Git, simulated Worktrunk/Cursor. After init, `.worktreeinclude` is
  rewritten to drop the required `.worktreeinclude` control entry. `check`
  reports a Copy-policy FAIL (native Worktrunk configuration must stay
  discoverable in linked worktrees), the summary carries one failure, and the
  command exits 1. (AC-07.2 FAIL half; a defined failure fixture for AC-11.2.)
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - cp: { from: "variants/worktreeinclude", to: "repo/.worktreeinclude" }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - 'FAIL  Required control entry ".worktreeinclude" is missing from .worktreeinclude'
    - "0 warn, 1 fail"
  stderr: ""
