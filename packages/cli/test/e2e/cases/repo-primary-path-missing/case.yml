id: repo-primary-path-missing
covers: REPO-FR-0004.AC-0005
title: a missing primary worktree path fails the support predicate without writes
description: >
  simulated Git (shape mode, `WTW_GIT_BIN` -> the checked-in fake `git`), simulated
  Worktrunk/Cursor. The fake reports a primary worktree record whose directory
  does not exist, so `check`'s repository predicate fails its
  `primary_path_exists` conjunct: the Repository category FAILs, dependent
  categories are SKIPPED, and the command exits 1 without writing.
env:
  WTW_GIT_BIN: __FAKE_GIT_BIN__
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
  FAKE_GIT_SHAPE: "1"
  FAKE_GIT_PRIMARY_MISSING: "1"
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  The primary worktree path does not exist as a directory:"
    - "SKIPPED  Skipped because the repository context is unavailable."
  stderr: ""
