id: sync-folders-sorted-deterministically
covers: WORK-FR-0004.AC-0001
title: sync reconciles folders with the primary first and linked worktrees sorted
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). Two
  linked worktrees are added in reverse display-name order (`feature-b` before
  `feature-a`). After `init` and a plain `sync`, the reconciled `folders` list is
  deterministic: the primary comes first, then the linked worktrees sorted by
  display name (`feature-a` before `feature-b`) — insertion order does not leak
  into the result (WORK-FR-0004.AC-0001).
cwd: repo
substitute:
  __PROJECT_ROOT__: projectRoot
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-b", "../wt-b"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - cli: ["init"]
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  files:
    "repo/repo.code-workspace": "expected/workspace"
