id: sync-unknown-option
covers:
  - WTW-FR-0002.AC-0203
title: sync accepts only --open
description: >
  `sync` accepts only the `--open` option; any other option is rejected, exiting
  1 with one `Error: <message>` line on stderr and empty stdout.
command: ["sync", "--nope"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Unknown sync option --nope.\n"
