id: repo-from-nested-linked
covers: REPO-FR-0001.AC-0004
title: sync resolves the primary context when run from a nested linked-worktree directory
description: >
  real Git, simulated Worktrunk/Cursor. The primary lives at `repo`; a linked
  worktree `wt-a` is created carrying a committed nested directory `sub`. Plain
  `sync` invoked from the NESTED linked-worktree directory `wt-a/sub` resolves
  the shared primary/common context, reconciles successfully, and exits 0.
  (Location independence, REPO-FR-0001.AC-0004.) The node setup step rebuilds the
  linked worktree because the harness pre-creates the nested cwd, which `git
  worktree add` would otherwise refuse as a non-empty target.
cwd: wt-a/sub
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - cp: { from: "seed/keep", to: "repo/sub/.keep" }
  - run: { cmd: ["git", "init", "-b", "main", "../../repo"] }
  - run: { cmd: ["git", "-C", "../../repo", "add", "sub/.keep"] }
  - run: { cmd: ["git", "-C", "../../repo", "commit", "-m", "init"] }
  - run:
      cmd:
        - "node"
        - "-e"
        - "const{execFileSync}=require('child_process');const path=require('path');const root=path.resolve(process.cwd(),'../..');execFileSync('rmdir',[path.join(root,'wt-a','sub')]);execFileSync('git',['-C',path.join(root,'repo'),'worktree','add',path.join(root,'wt-a'),'-b','feature-a']);"
  - cli: ["init"]
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
