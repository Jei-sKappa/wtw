id: sync-open-launch-failure-preserves
covers: CURSOR-FR-0003.AC-0001
title: a Cursor launch failure after writes preserves files and exits 1
description: >
  real Git, simulated Cursor failure. The fake `cursor` is driven to exit
  non-zero via `FAKE_CURSOR_FAIL` AFTER recording its invocation. Because the
  launch is gated strictly after every synchronization write, the reconciled
  workspace is already on disk: the command exits 1 with the launch error on
  stderr, and the synchronized workspace file is left in place (no rollback).
cwd: repo
substitute:
  __PROJECT_ROOT__: projectRoot
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  FAKE_CURSOR_FAIL: "1"
  FAKE_CURSOR_STDERR: "fake-cursor: simulated launch failure"
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["sync", "--open"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Failed to launch Cursor for workspace __PROJECT_ROOT__/repo/repo.code-workspace (exit 1): fake-cursor: simulated launch failure\n"
  fileContains:
    "repo/repo.code-workspace": ["feature-a"]
    "repo/.fake-cursor.log": ["repo.code-workspace"]
