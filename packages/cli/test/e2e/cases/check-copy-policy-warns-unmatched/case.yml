id: check-copy-policy-warns-unmatched
covers:
  - WTW-FR-0011.AC-1102
  - WTW-FR-0007.AC-0702
title: check warns (not fails) for a copy-policy entry matching no ignored content
description: >
  real Git, simulated Worktrunk/Cursor. After init, `.worktreeinclude` is
  rewritten to keep both required control entries plus a user entry
  (`secret-data/`) that currently matches no ignored path. `check` reports that
  entry as a WARN — never a FAIL — the summary carries one warning and zero
  failures, and the command exits 0 (a warning-only run). (AC-07.2 WARN half.)
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - cp: { from: "variants/worktreeinclude", to: "repo/.worktreeinclude" }
command: ["check"]
expect:
  exitCode: 0
  stdoutContains:
    - 'WARN  .worktreeinclude entry "secret-data/" matches no currently ignored path'
    - "1 warn, 0 fail"
  stderr: ""
