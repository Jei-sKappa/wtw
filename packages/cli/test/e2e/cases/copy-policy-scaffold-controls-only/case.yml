id: copy-policy-scaffold-controls-only
covers: COPY-FR-0001.AC-0001
title: init scaffolds a copy policy with only the two control entries and guidance
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). When
  `.worktreeinclude` is absent, `init` scaffolds it with exactly the two required
  control entries (`.config/wt.toml` and `.worktreeinclude`) plus user-editing
  guidance, guessing no private-data entries of its own. The full-file compare
  proves the scaffold is byte-exact — no invented ignored paths (COPY-FR-0001.AC-0001).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Created:"]
  stderr: ""
  files:
    "repo/.worktreeinclude": "expected/worktreeinclude"
