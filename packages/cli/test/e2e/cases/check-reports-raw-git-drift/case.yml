id: check-reports-raw-git-drift
covers:
  - WTW-FR-0008.AC-0805
title: check reports a raw-git linked worktree as synchronization drift
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, a linked
  worktree is created with raw `git worktree add` (which runs no Worktrunk
  hooks), so it has no control files and is absent from the workspace folders.
  `check` reports this as Synchronization drift — divergent/missing linked
  control files AND out-of-date workspace folders — and exits 1. This is the
  read-only REPORT half of AC-08.5 (the repair is proven by `wtw sync`).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  1 linked worktree(s) have missing or divergent control files"
    - "FAIL  Cursor workspace folders are out of date"
  stderr: ""
