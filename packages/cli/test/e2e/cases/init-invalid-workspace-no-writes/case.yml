id: init-invalid-workspace-no-writes
covers:
  - WTW-FR-0004.AC-0401
  - WTW-FR-0009.AC-0901
title: an invalid workspace JSONC makes init perform no writes
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). The
  primary `<repo>.code-workspace` is invalid JSONC. `init` detects it in the
  preflight, exits 1, and writes nothing: the workspace file and the
  user-authored `info/exclude` are byte-for-byte unchanged (no managed block is
  added, no scaffolds are created).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/workspace", to: "repo/repo.code-workspace" }
  - cp: { from: "seed/exclude", to: "repo/.git/info/exclude" }
command: ["init"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: init cannot proceed; resolve the following, then rerun (wtw made no changes):\n  - The Cursor workspace repo.code-workspace is not valid JSONC; fix it before running init.\n"
  files:
    "repo/repo.code-workspace": "expected/workspace"
    "repo/.git/info/exclude": "expected/info-exclude"
