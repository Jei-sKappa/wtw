id: lifecycle-no-hooks-repaired
covers:
  - WTW-FR-0013.AC-1303
title: repair after a --no-hooks worktree creation
description: >
  real Git, simulated Worktrunk (the `--no-hooks` creation is simulated). A
  worktree created with Worktrunk's `--no-hooks` retains native behavior and
  receives no automatic `wtw` compensation, so it starts with no canonical
  control files and no workspace entry. Spec lifecycle behavior makes the repair
  path an explicit `wtw sync`. Here a hook-less worktree creation (modelled by a
  raw `git worktree add`, which likewise runs no hooks) is repaired by an
  explicit `sync`: it gains the canonical `.config/wt.toml` and `.worktreeinclude`
  copies and a workspace folder entry, with no real binary needed.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "no-hooks", "../wt-no-hooks"] }
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  files:
    "wt-no-hooks/.config/wt.toml": "expected/wt.toml"
    "wt-no-hooks/.worktreeinclude": "expected/worktreeinclude"
  fileContains:
    "repo/repo.code-workspace": ["no-hooks"]
