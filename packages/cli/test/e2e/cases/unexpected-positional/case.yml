id: unexpected-positional
covers: CLI-FR-0002.AC-0003
title: Unexpected positional argument is rejected
description: >
  A command that accepts no positional arguments rejects an extra positional,
  exiting 1 with exactly one `Error: <message>` line on stderr and empty stdout.
command: ["init", "extra"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Unexpected argument extra for init.\n"
