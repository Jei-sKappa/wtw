id: check-no-cursor-launch
covers: CURSOR-FR-0001.AC-0003
title: check never launches Cursor
description: >
  real Git, simulated Worktrunk/Cursor. `WTW_CURSOR_BIN` points at the fake
  `cursor` shim, but `check` is read-only and must never launch it — only `sync
  --open` may. After a healthy `init`, `check` runs and the pre-seeded, empty
  invocation log is left EMPTY, proving the launch path was never taken
  (CURSOR-FR-0001.AC-0003).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains: ["Summary:"]
  stderr: ""
  files:
    "repo/.fake-cursor.log": "expected/empty-log"
