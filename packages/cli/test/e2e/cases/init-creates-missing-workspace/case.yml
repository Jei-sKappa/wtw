id: init-creates-missing-workspace
covers: WORK-FR-0001.AC-0001
title: init creates a missing root Cursor workspace file
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). The
  primary worktree has no `<primary-directory-name>.code-workspace`. `init`
  creates it, so the previously-absent `repo.code-workspace` exists afterwards
  carrying the top-level `folders` property with the primary worktree
  (WORK-FR-0001.AC-0001).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Created:", "repo.code-workspace"]
  stderr: ""
  fileContains:
    "repo/repo.code-workspace":
      - "\"folders\""
      - "/repo"
