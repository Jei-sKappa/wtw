id: init-exclude-block-no-duplicates
covers: PRIV-FR-0001.AC-0002
title: reconciling an already-valid managed block adds no duplicate entries
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). An
  existing `info/exclude` already carries a valid managed block covering exactly
  the required private paths. `init` reconciles it as a no-op: the single
  delimited block is preserved with no duplicated entries, and the command exits
  0 reporting the block is already up to date.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/exclude", to: "repo/.git/info/exclude" }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Managed info/exclude block already up to date."]
  stderr: ""
  files:
    "repo/.git/info/exclude": "expected/info-exclude"
