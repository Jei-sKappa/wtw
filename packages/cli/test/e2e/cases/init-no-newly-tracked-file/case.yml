id: init-no-newly-tracked-file
covers: PRIV-FR-0002.AC-0003
title: a successful init introduces no newly tracked repository file
description: >
  real Git, simulated Worktrunk/Cursor. A successful `init` (run as a setup
  step) scaffolds the canonical control files and the workspace. A follow-up
  `check` confirms the initialization introduced no newly tracked repository
  file: the Privacy category reports that no required private path is tracked by
  Git, and the command exits 0.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains: ["PASS  No required private path is tracked by Git."]
  stderr: ""
