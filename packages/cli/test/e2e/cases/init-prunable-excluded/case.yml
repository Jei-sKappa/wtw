id: init-prunable-excluded
covers:
  - WTW-FR-0009.AC-0905
title: init excludes a missing worktree from folders and never prunes it
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). A
  linked worktree is registered and then its directory is deleted, leaving a
  missing/prunable registration. `init`'s synchronization excludes it from the
  reconciled workspace `folders` and never prunes the registration: Git's
  worktree metadata for it remains after `init` exits 0.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
  - run: { cmd: ["rm", "-rf", "../wt-a"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
  fileNotContains:
    "repo/repo.code-workspace":
      - "feature-a"
      - "wt-a"
  fileContains:
    "repo/.git/worktrees/wt-a/HEAD":
      - "refs/heads/feature-a"
