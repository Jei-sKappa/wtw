id: init-missing-dependency-no-writes
covers: INIT-FR-0002.AC-0001
title: an unresolvable required executable makes init write nothing
description: >
  real Git, simulated Cursor. The Worktrunk (`wt`) executable cannot be resolved
  on PATH, so init's dependency preflight raises a predictable conflict. init
  exits 1, prints the exact `Error:` preflight message on stderr with empty
  stdout, and writes nothing: the user-authored `info/exclude` is byte-for-byte
  unchanged (no managed block added).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: wtw-missing-bin
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/exclude", to: "repo/.git/info/exclude" }
command: ["init"]
expect:
  exitCode: 1
  stdout: ""
  stderrFile: "expected/stderr"
  files:
    "repo/.git/info/exclude": "expected/info-exclude"
