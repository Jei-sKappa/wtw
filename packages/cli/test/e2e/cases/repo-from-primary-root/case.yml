id: repo-from-primary-root
covers: REPO-FR-0001.AC-0001
title: init resolves the primary context when run from the primary root
description: >
  real Git, simulated Worktrunk/Cursor. `init` is invoked from the primary
  worktree root `repo`. It resolves the canonical primary/common context,
  creates the canonical artifacts at that root, and exits 0. (Location
  independence, REPO-FR-0001.AC-0001.)
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Initialized wtw local automation", "Created:"]
  stderr: ""
