id: check-invalid-jsonc-workspace-fails
covers: WORK-FR-0003.AC-0002
title: check reports a failure for an invalid-JSONC workspace file
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, the primary
  `repo.code-workspace` is overwritten with invalid JSONC. Because a workspace
  that is not valid JSONC cannot be edited surgically, `check` emits a Cursor
  workspace FAIL naming the file and exits 1 (WORK-FR-0003.AC-0002; the sync-side
  no-write half is proven by `sync-invalid-jsonc-no-write`).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - cp: { from: "fixture/bad-workspace", to: "repo/repo.code-workspace" }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  Cursor workspace repo.code-workspace is not valid JSONC."
    - "1 fail"
  stderr: ""
