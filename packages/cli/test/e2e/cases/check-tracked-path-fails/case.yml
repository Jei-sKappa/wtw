id: check-tracked-path-fails
covers: PRIV-FR-0002.AC-0002
title: check fails when a required private path is tracked by Git
description: >
  real Git, simulated Worktrunk/Cursor. After a healthy `init`, a required
  private path (`.worktreeinclude`) is force-added and committed, so Git tracks
  it. Because a local exclude cannot hide a tracked file, `check` emits a
  Privacy FAIL naming the tracked path and exits 1 (the complementary check-side
  half of PRIV-FR-0002 (PRIV-FR-0002.AC-0002); the `init` no-write half is proven by
  `init-tracked-path-no-writes`).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cli: ["init"]
  - run: { cmd: ["git", "add", "-f", ".worktreeinclude"] }
  - run: { cmd: ["git", "commit", "-m", "track worktreeinclude"] }
command: ["check"]
expect:
  exitCode: 1
  stdoutContains:
    - "FAIL  Required private path(s) tracked by Git: .worktreeinclude."
    - "0 warn, 1 fail"
  stderr: ""
