id: sync-from-linked-root
covers: REPO-FR-0001.AC-0003
title: sync resolves the same primary context when run from a linked worktree
description: >
  real Git, simulated Worktrunk/Cursor. The primary lives at `repo`; a linked
  worktree `wt-a` is created and initialized. Plain `sync` invoked from the
  LINKED worktree root resolves the shared primary/common context, reconciles
  successfully, and exits 0. (Location independence, REPO-FR-0001.AC-0003.)
cwd: wt-a
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "-C", "..", "init", "-b", "main", "repo"] }
  - run: { cmd: ["git", "-C", "../repo", "commit", "--allow-empty", "-m", "init"] }
  - run:
      { cmd: ["git", "-C", "../repo", "worktree", "add", "../wt-a", "-b", "feature-a"] }
  - cli: ["init"]
command: ["sync"]
expect:
  exitCode: 0
  stdoutContains: ["Synchronized"]
  stderr: ""
