id: check-from-linked-root
covers:
  - WTW-FR-0003.AC-0301
title: check resolves the same primary context when run from a linked worktree
description: >
  real Git, simulated Worktrunk/Cursor. The primary lives at `repo`; a linked
  worktree `wt-a` is created and initialized. `check` is invoked from the LINKED
  worktree root and still resolves the shared primary/common context — its
  Repository finding names the primary worktree at `<root>/repo` — and every
  finding passes, exiting 0. (Location independence, AC-03.1.)
cwd: wt-a
substitute:
  __PROJECT_ROOT__: projectRoot
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "-C", "..", "init", "-b", "main", "repo"] }
  - run: { cmd: ["git", "-C", "../repo", "commit", "--allow-empty", "-m", "init"] }
  - run:
      { cmd: ["git", "-C", "../repo", "worktree", "add", "../wt-a", "-b", "feature-a"] }
  - cli: ["init"]
command: ["check"]
expect:
  exitCode: 0
  stdoutContains:
    - "Supported repository; primary worktree at __PROJECT_ROOT__/repo."
    - "0 warn, 0 fail"
  stderr: ""
