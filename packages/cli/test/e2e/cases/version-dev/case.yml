id: version-dev
covers: VER-FR-0001.AC-0001
title: Version via --version (dev)
description: >
  A source/test run of `wtw --version` prints exactly the CLI package version
  followed by ` (dev)` to stdout and exits 0.
command: ["--version"]
substitute:
  __VERSION__: wtwCliVersion
expect:
  exitCode: 0
  stdout: "__VERSION__ (dev)\n"
  stderr: ""
