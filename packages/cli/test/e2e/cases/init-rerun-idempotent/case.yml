id: init-rerun-idempotent
covers: INIT-FR-0003.AC-0001
title: rerunning init on a healthy setup is a no-op apart from reconciliation
description: >
  real Git, simulated Worktrunk/Cursor (resolved on PATH, never spawned). A
  first `init` (run as a setup step) creates the scaffolds and the managed
  exclude block over a user-authored `info/exclude`. The second `init` (the
  command under test) exits 0, preserves the scaffolds and the user bytes, and
  leaves a single managed block with no duplicated entries.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - cp: { from: "seed/exclude", to: "repo/.git/info/exclude" }
  - cli: ["init"]
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Preserved:", "already up to date"]
  stderr: ""
  files:
    "repo/.git/info/exclude": "expected/info-exclude"
    "repo/.config/wt.toml": "expected/wt.toml"
    "repo/.worktreeinclude": "expected/worktreeinclude"
