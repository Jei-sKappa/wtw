id: init-scaffolds-toml-hooks
covers: CONF-FR-0001.AC-0001
title: init scaffolds wt.toml with the three reserved hook command strings
description: >
  real Git, simulated Worktrunk/Cursor. `.config/wt.toml` is absent, so `init`
  scaffolds it. The scaffolded file carries exactly the three reserved hooks
  with their distinct contract command strings: a `pre-start` blocking copy, a
  `post-start` sync-and-open, and a `post-remove` sync. The full-file compare
  proves the exact command strings.
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
  WTW_WT_BIN: __FAKE_WT_BIN__
  WTW_CURSOR_BIN: __FAKE_CURSOR_BIN__
  WTW_NODE_BIN: __FAKE_GIT_BIN__
  WTW_WTW_BIN: __FAKE_GIT_BIN__
  WTW_PLATFORM: darwin
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
command: ["init"]
expect:
  exitCode: 0
  stdoutContains: ["Created:"]
  stderr: ""
  files:
    "repo/.config/wt.toml": "expected/wt.toml"
