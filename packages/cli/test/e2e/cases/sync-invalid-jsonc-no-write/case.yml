id: sync-invalid-jsonc-no-write
covers: WORK-FR-0003.AC-0001
title: invalid JSONC fails sync without changing the workspace
description: >
  real Git, simulated nothing. The primary workspace file is invalid JSONC.
  `sync` exits 1 and leaves the file byte-for-byte unchanged (no partial or
  overwritten workspace).
cwd: repo
env:
  GIT_AUTHOR_NAME: wtw-test
  GIT_AUTHOR_EMAIL: wtw@example.com
  GIT_COMMITTER_NAME: wtw-test
  GIT_COMMITTER_EMAIL: wtw@example.com
setup:
  - run: { cmd: ["git", "init", "-b", "main", "."] }
  - run: { cmd: ["git", "commit", "--allow-empty", "-m", "init"] }
  - run: { cmd: ["git", "worktree", "add", "-b", "feature-a", "../wt-a"] }
command: ["sync"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: The Cursor workspace repo.code-workspace is not valid JSONC; no changes were made.\n"
  files:
    "repo/repo.code-workspace": "expected/workspace.txt"
